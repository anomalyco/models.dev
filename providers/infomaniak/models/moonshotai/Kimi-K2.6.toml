base_model = "moonshotai/kimi-k2.6"
last_updated = "2026-06-28"
status = "beta"
# Reasoning verified live against the Infomaniak API on 2026-06-28: the OpenAI-compatible
# `reasoning_effort` field is an on/off toggle, not graded effort — "none" disables thinking
# (response `reasoning` is null); any other value (e.g. "low") or omitting the field enables
# it, and thinking is on by default. Reasoning text is returned in the `message.reasoning`
# field, so `interleaved = true` is set without a field name (the schema's reasoning_content/
# reasoning_details enum does not cover `reasoning`).
# Source: https://developer.infomaniak.com/docs/api/post/2/ai/{product_id}/openai/v1/chat/completions
reasoning_options = [{ type = "toggle" }]
interleaved = true

[cost]
input = 0.60
output = 3.00

[limit]
context = 256_000
input = 256_000
output = 256_000
