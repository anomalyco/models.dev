base_model = "mistral/mistral-small-2603"
last_updated = "2026-06-28"
# Reasoning verified live against the Infomaniak API on 2026-06-28: Mistral accepts
# `reasoning_effort` of only "none" or "high" ("low"/"medium" -> HTTP 400). "high" enables
# thinking and returns it in `message.reasoning`; the reliable "off" is to omit the field, as
# an explicit "none" currently 400s server-side ("chat_template is not supported for Mistral
# tokenizers"). The effect is binary, so `type = "toggle"`; reasoning text -> `interleaved = true`.
# Source: https://developer.infomaniak.com/docs/api/post/2/ai/{product_id}/openai/v1/chat/completions
reasoning_options = [{ type = "toggle" }]
interleaved = true

[cost]
input = 0.20
output = 0.75

[limit]
context = 256_000
input = 256_000
