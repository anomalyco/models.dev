# Reasoning HTTP format (accessed 2026-06-27):
# OpenAI Chat: POST /api/v3/chat/completions; top-level `thinking` object with
# `type` = "enabled"|"disabled" and optional `budget_tokens` integer.
# OpenAI Responses: POST /api/v3/responses; `reasoning.effort` or
# `reasoning.effort` with `max_tokens`.
# Anthropic (Claude): POST /api/v3/messages; `thinking.type` = enabled|disabled;
# enabled requires `budget_tokens >= 1024` and `< max_tokens`.
# Sources:
# https://www.volcengine.com/docs/82379/1399008
# https://www.volcengine.com/docs/82379/1544106
name = "Volcengine Ark"
env = ["ARK_API_KEY"]
npm = "@ai-sdk/openai-compatible"
api = "https://ark.cn-beijing.volces.com/api/v3"
doc = "https://www.volcengine.com/docs/82379/1099455"
