[model]
name = "OpenAI o3 Mini"
provider = "burncloud"
model_id = "o3-mini"
type = "chat"
description = "OpenAI o3 Mini model, efficient advanced reasoning"

[model.context]
max_tokens = 200000
supports_vision = false
supports_tools = false

[model.pricing]
input_price_per_token = 0.000015  # $15.00 per million input tokens
output_price_per_token = 0.00006  # $60.00 per million output tokens

[model.capabilities]
streaming = false
json_mode = false
function_calling = false
reasoning = true