[model]
name = "Qwen3 235B A22B"
provider = "burncloud"
model_id = "qwen3-235b-a22b"
type = "chat"
description = "Qwen3 235B A22B model, large-scale language model with extensive knowledge"

[model.context]
max_tokens = 32768
supports_vision = false
supports_tools = true

[model.pricing]
input_price_per_token = 0.000001  # $1.00 per million input tokens
output_price_per_token = 0.000002  # $2.00 per million output tokens

[model.capabilities]
streaming = true
json_mode = true
function_calling = true