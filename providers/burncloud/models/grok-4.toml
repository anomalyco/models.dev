[model]
name = "Grok 4"
provider = "burncloud"
model_id = "grok-4"
type = "chat"
description = "Grok 4 model, latest generation with enhanced performance"

[model.context]
max_tokens = 131072
supports_vision = true
supports_tools = true

[model.pricing]
input_price_per_token = 0.000003  # $3.00 per million input tokens
output_price_per_token = 0.000015  # $15.00 per million output tokens

[model.capabilities]
streaming = true
json_mode = true
function_calling = true
image_vision = true