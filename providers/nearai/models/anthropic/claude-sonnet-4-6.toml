base_model = "anthropic/claude-sonnet-4-6"
structured_output = true

[[reasoning_options]]
type = "toggle"

[[reasoning_options]]
type = "effort"
values = ["low", "medium", "high", "max"]

[[reasoning_options]]
type = "budget_tokens"
min = 1_024
max = 63_999

[cost]
input = 3
output = 15
cache_read = 0.3
cache_write = 3.75

[limit]
output = 16_384

[modalities]
input = ["text", "image"]
