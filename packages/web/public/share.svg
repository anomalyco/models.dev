<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
<defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&amp;family=Rubik:wght@500&amp;display=swap');
    </style>
  </defs>
  <title id="title">Nathan Papes Periodic Card Logo</title>
  <desc id="desc">Periodic table element-style logo featuring atomic number 93, office A2, element symbol Np, and the name Nathan.</desc>

  <!-- Background with 4px black border -->
  <rect x="2" y="2" width="252" height="252" rx="0" ry="0" fill="#CDE7DA" stroke="#000000" stroke-width="4" />

  <!-- Atomic number -->
  <text x="14" y="30" font-family="'IBM Plex Mono', 'Rubik', monospace, sans-serif" font-size="22" fill="#333333" font-weight="600">93</text>

  <!-- Office code -->
  <text x="242" y="30" text-anchor="end" font-family="'IBM Plex Mono', 'Rubik', monospace, sans-serif" font-size="22" fill="#333333" font-weight="600">A2</text>

  <!-- Element symbol -->
  <text x="128" y="140" text-anchor="middle" dominant-baseline="middle" font-family="'IBM Plex Mono', 'Rubik', monospace, sans-serif" font-size="110" fill="#333333" font-weight="500">Np</text>

  <!-- Name -->
  <text x="128" y="228" text-anchor="middle" font-family="'IBM Plex Mono', 'Rubik', monospace, sans-serif" font-size="30" fill="#333333" font-weight="500">Nathan</text>
</svg> 